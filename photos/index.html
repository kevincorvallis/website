    <!-- Prevent flash of wrong theme -->
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            const systemPreference = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', stored || systemPreference);
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0eee6;
            --text: #1f1e1d;
            --font: 'Newsreader', Georgia, 'Times New Roman', serif;
            color-scheme: light dark;
        }

        [data-theme="dark"] {
            --bg: #1f1e1d;
            --text: #f0eee6;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            font-size: 20px;
            line-height: 1.6;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        ::selection {
            background: rgba(0, 100, 255, 0.26);
            color: inherit;
        }

        a {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.3s ease;
        }

        a:hover {
            opacity: 0.6;
        }

        header {
            max-width: 960px;
            margin: 0 auto;
            padding: 15px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            font-size: 15px;
            font-weight: 400;
            text-decoration: none;
            opacity: 0.65;
            transition: opacity 0.2s ease, color 0.3s ease;
        }

        .back-link:hover {
            opacity: 0.85;
        }

        a:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 3px;
            border-radius: 2px;
        }

        .page-title {
            font-size: 34px;
            font-weight: 600;
            line-height: 1.15;
        }

        .page-header {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 20px 0;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
        }

        .toggle-wrap input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .toggle-wrap input:focus-visible + label {
            outline: 2px solid var(--text);
            outline-offset: 3px;
            border-radius: 10px;
        }

        .toggle-wrap label {
            position: relative;
            display: block;
            width: 40px;
            height: 20px;
            background: var(--text);
            border-radius: 10px;
            cursor: pointer;
        }

        .toggle-wrap label::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--bg);
            border-radius: 50%;
            transition: transform 0s;
        }

        .toggle-wrap label.has-transition::after {
            transition: transform 0.2s;
        }

        .toggle-wrap input:checked + label::after {
            transform: translateX(20px);
        }

        .gallery {
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem 20px 4rem;
            columns: 2;
            column-gap: 1rem;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 20px 2rem;
        }

        footer p {
            font-size: 14px;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .gallery {
                columns: 1;
            }

            .back-link {
                font-size: 14px;
            }

            .page-title {
                font-size: 28px;
            }
        }

        /* ——— Accessibility ——— */

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            padding: 8px 16px;
            background: var(--text);
            color: var(--bg);
            z-index: 100;
            font-size: 14px;
            text-decoration: none;
            transition: top 0.2s ease;
        }

        .skip-link:focus {
            top: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <a href="#main" class="skip-link">Skip to content</a>

    <header>
        <a href="/" class="back-link">← Kevin Lee</a>
        <div class="toggle-wrap">
            <input type="checkbox" id="theme-toggle" aria-label="Toggle dark mode">
            <label for="theme-toggle"><span class="sr-only">Toggle dark mode</span></label>
        </div>
    </header>

    <main id="main">
    <div class="page-header">
        <h1 class="page-title" data-i18n="photos.heading">Photos</h1>
    </div>

    <div class="gallery">
        <img src="/images/kevi394-053.jpg" alt="Rural road sign reading Markle Ln with open grassland and mountains under blue sky" loading="eager" width="1200" height="806">
        <img src="/images/kevi394-084.jpg" alt="Herd of alpacas walking through a green pasture, shot from behind" loading="lazy" width="806" height="1200">
        <img src="/images/KEVI554-009.jpg" alt="Two friends skiing on a mountain, one giving a thumbs up with snowy peaks behind" loading="lazy" width="1200" height="854">
        <img src="/images/KEVI554-056.jpg" alt="Five friends posing together at night in casual clothes and hats" loading="lazy" width="1200" height="814">
        <img src="/images/kevi742-032.jpg" alt="Two people smiling in yellow USC rain ponchos at night" loading="lazy" width="1200" height="806">
        <img src="/images/kevi742-050.jpg" alt="Couple holding a small dog at a nighttime outdoor event, city lights in the background" loading="lazy" width="1200" height="806">
        <img src="/images/kevi742-064.jpg" alt="Couple smiling together in front of a green wall at night" loading="lazy" width="806" height="1200">
        <img src="/images/kevi742-070.jpg" alt="Two friends sitting together on a city bridge at night" loading="lazy" width="1200" height="806">
        <img src="/images/kevi742-073.jpg" alt="Group selfie of six friends outdoors at night with string lights behind" loading="lazy" width="1200" height="806">
    </div>
