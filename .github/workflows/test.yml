name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke + CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Fast layers — run against production. Catches regressions in deployed code.
      - run: npm run test:smoke
        env:
          PW_BASE_URL: https://klee.page
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: tests/.report
          retention-days: 14

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Visual tests gated to manual + scheduled runs because pixel diffs across
    # operating systems are noisy; macOS local snapshots may differ from Linux CI.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual
        env:
          PW_BASE_URL: https://klee.page
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-report
          path: tests/.report
          retention-days: 14
